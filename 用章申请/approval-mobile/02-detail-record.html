<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>任务详情 - 审批记录 - 智慧学工</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#1e293b;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:20px}
a{text-decoration:none;color:inherit}
.header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:50}
.header .back{font-size:18px;color:#64748b}
.header h1{font-size:16px;font-weight:600;flex:1;text-align:center}
.top-info{background:#fff;padding:14px 16px;position:relative}
.flow-title{font-size:16px;font-weight:700;padding-right:60px;line-height:1.4}
.flow-meta{font-size:12.5px;color:#64748b;margin-top:6px}
.flow-admin{display:flex;align-items:center;gap:6px;font-size:12.5px;color:#64748b;margin-top:6px}
.flow-admin .admin-icon{width:20px;height:20px;border-radius:50%;background:#d97706;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.flow-stamp{position:absolute;top:12px;right:16px;width:48px;height:48px;border-radius:50%;border:2px solid #d97706;display:flex;align-items:center;justify-content:center;font-size:10px;color:#d97706;font-weight:600;transform:rotate(-15deg);opacity:0.7}
.detail-tabs{background:#fff;display:flex;border-bottom:1px solid #f0f0f0;position:sticky;top:44px;z-index:40}
.detail-tab{flex:1;text-align:center;padding:12px 0;font-size:14px;color:#94a3b8;font-weight:500;border-bottom:2px solid transparent}
.detail-tab.active{color:#d97706;font-weight:600;border-bottom-color:#d97706}

.timeline{padding:20px 16px 20px 40px;position:relative}
.timeline::before{content:"";position:absolute;left:27px;top:20px;bottom:20px;width:2px;background:#e2e8f0}
.tl-item{position:relative;padding-bottom:28px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-21px;top:2px;width:14px;height:14px;border-radius:50%;border:2px solid #e2e8f0;background:#fff;z-index:1}
.tl-item.done .tl-dot{background:#059669;border-color:#059669}
.tl-item.done .tl-dot::after{content:"✓";color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.tl-item.pending .tl-dot{background:#fff;border-color:#cbd5e1}
.tl-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.tl-avatar{width:28px;height:28px;border-radius:50%;background:#d97706;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.tl-item.pending .tl-avatar{background:#cbd5e1}
.tl-name{font-size:14px;font-weight:600}
.tl-item.pending .tl-name{color:#94a3b8}
.tl-status{font-size:12px;padding:2px 8px;border-radius:10px;font-weight:500}
.tl-item.done .tl-status{background:#ecfdf5;color:#059669}
.tl-item.pending .tl-status{background:#f1f5f9;color:#94a3b8}
.tl-time{font-size:12px;color:#94a3b8;margin-top:2px}
</style>
</head>
<body>

<div class="header">
  <a class="back" href="01-pending-list.html">←</a>
  <h1>任务详情</h1>
</div>

<div class="top-info">
  <div class="flow-title">用章申请</div>
  <div class="flow-meta">当前任务：辅导员审批</div>
  <div class="flow-admin"><div class="admin-icon">张</div>张三</div>
  <div class="flow-stamp">审批中</div>
</div>

<div class="detail-tabs">
  <a class="detail-tab" href="02-approval-detail.html">表单详情</a>
  <a class="detail-tab active" href="02-detail-record.html">审批记录</a>
</div>

<div class="timeline">
  <div class="tl-item done">
    <div class="tl-dot"></div>
    <div class="tl-head">
      <div class="tl-avatar">张</div>
      <span class="tl-name">张三</span>
      <span class="tl-status">提交申请</span>
    </div>
    <div class="tl-time">2026-04-15 14:30:00</div>
  </div>

  <div class="tl-item pending">
    <div class="tl-dot"></div>
    <div class="tl-head">
      <div class="tl-avatar">王</div>
      <span class="tl-name">王老师</span>
      <span class="tl-status">待审批</span>
    </div>
  </div>

  <div class="tl-item pending">
    <div class="tl-dot"></div>
    <div class="tl-head">
      <div class="tl-avatar">李</div>
      <span class="tl-name">李副书记</span>
      <span class="tl-status">待审批</span>
    </div>
  </div>

  <div class="tl-item pending">
    <div class="tl-dot"></div>
    <div class="tl-head">
      <div class="tl-avatar">陈</div>
      <span class="tl-name">陈主任</span>
      <span class="tl-status">待审批</span>
    </div>
  </div>
</div>

</body>
</html>
