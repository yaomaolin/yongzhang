<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>审批确认 - 智慧学工</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#1e293b;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:20px}
a{text-decoration:none;color:inherit}
.header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:50}
.header .back{font-size:18px;color:#64748b}
.header h1{font-size:16px;font-weight:600;flex:1;text-align:center}

.confirm-card{background:#fff;margin:12px;border-radius:10px;padding:20px 16px;border:1px solid #e2e8f0}
.section-title{font-size:15px;font-weight:600;margin-bottom:16px}
.option-group{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.option-tag{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;text-align:center}
.option-tag.selected{border-color:#059669;background:#ecfdf5;color:#059669;font-weight:600}
.option-tag.reject{color:#64748b}
.option-tag.return{color:#64748b}
.opinion-area{width:100%;min-height:120px;padding:12px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:13.5px;font-family:inherit;background:#f8fafc;color:#0f172a;resize:vertical}
.opinion-area::placeholder{color:#94a3b8}
.submit-btn{display:block;width:100%;margin-top:20px;padding:14px;border-radius:10px;text-align:center;font-size:16px;font-weight:600;background:#d97706;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <a class="back" href="02-approval-detail.html">←</a>
  <h1>审批确认</h1>
</div>

<div class="confirm-card">
  <div class="section-title">审批操作</div>
  <div class="option-group">
    <div class="option-tag selected" onclick="selectOption(this)">通过</div>
    <div class="option-tag reject" onclick="selectOption(this)">不通过</div>
    <div class="option-tag return" onclick="selectOption(this)">驳回</div>
  </div>
  <textarea class="opinion-area" placeholder="请输入审批意见（可选）"></textarea>
  <a class="submit-btn" href="01-pending-list.html">提交</a>
</div>

<script>
function selectOption(el){
  document.querySelectorAll('.option-tag').forEach(function(t){t.classList.remove('selected')});
  el.classList.add('selected');
}
</script>

</body>
</html>
