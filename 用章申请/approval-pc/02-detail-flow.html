<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>审批详情 - 流程图 - 智慧学工</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;color:#0f172a;display:flex;min-height:100vh}
a{text-decoration:none;color:inherit}
.sidebar{width:220px;background:#fff;border-right:1px solid #e2e8f0;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.sidebar-brand{height:56px;display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:15px}
.sidebar-brand .logo{width:28px;height:28px;border-radius:7px;background:#d97706;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13.5px;color:#64748b;margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:#f1f5f9;color:#0f172a}
.nav-item.active{background:#fffbeb;color:#d97706;font-weight:500}
.nav-icon{width:20px;text-align:center;font-size:15px}
.nav-section{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:12px 12px 4px;margin-top:4px}
.sidebar-footer{padding:12px 20px;border-top:1px solid #e2e8f0;font-size:12px}
.sidebar-footer a{color:#64748b;font-size:12px}
.sidebar-footer a:hover{color:#d97706}
.main{margin-left:220px;flex:1;min-width:0}
.topbar{height:56px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:600}
.topbar-user{font-size:13px;color:#64748b}

.detail-header{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:56px;z-index:40}
.detail-header-inner{max-width:960px;margin:0 auto;padding:0 32px}
.tab-row{display:flex;align-items:center;gap:0;border-bottom:1px solid #f1f5f9;padding-top:8px}
.tab-item{padding:10px 20px;font-size:13.5px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;position:relative;top:1px}
.tab-item.active{color:#d97706;border-bottom-color:#d97706;font-weight:600}
.tab-item:hover{color:#d97706}
.close-btn{margin-left:auto;width:28px;height:28px;border-radius:50%;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#94a3b8;cursor:pointer;background:#fff;align-self:center}
.close-btn:hover{background:#f8fafc;color:#0f172a}
.title-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0 14px}
.title-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.title-name{font-size:16px;font-weight:700}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-size:11.5px;font-weight:500}
.tag-node{background:#e0f2fe;color:#0369a1}
.tag-user{background:#fef3c7;color:#92400e}
.tag-status{font-size:12px;color:#d97706;font-weight:500;margin-left:4px}
.action-btns{display:flex;gap:8px}
.btn{padding:8px 24px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;color:#fff}
.btn-pass{background:#059669}.btn-pass:hover{background:#047857}
.btn-fail{background:#dc2626}.btn-fail:hover{background:#b91c1c}
.btn-return{background:#f59e0b}.btn-return:hover{background:#d97706}

.content{max-width:960px;margin:0 auto;padding:20px 32px 48px}
.section{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px 24px;margin-bottom:16px}
.section-title{font-size:14px;font-weight:600;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #f1f5f9;color:#0f172a}

.flow-canvas{border:2px solid #e0f2fe;border-radius:10px;padding:40px 24px;min-height:280px;display:flex;align-items:center;justify-content:center;background:#fafcff}
.flow-chain{display:flex;align-items:center;gap:0}
.flow-start{width:28px;height:28px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center}
.flow-start-inner{width:14px;height:14px;border-radius:50%;background:#fff}
.flow-end{width:28px;height:28px;border-radius:50%;border:3px solid #64748b;display:flex;align-items:center;justify-content:center}
.flow-end-inner{width:12px;height:12px;border-radius:50%;background:#64748b}
.flow-connector{width:40px;height:2px;background:#94a3b8;position:relative}
.flow-connector::after{content:"";position:absolute;right:-4px;top:-4px;border:5px solid transparent;border-left-color:#94a3b8}
.flow-step{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px}
.flow-step-box{border:2px solid #c7d2fe;background:#eef2ff;border-radius:10px;padding:14px 24px;font-size:13px;font-weight:500;color:#4338ca;min-width:120px;text-align:center;display:flex;align-items:center;gap:6px;justify-content:center}
.flow-step-box .icon{width:20px;height:20px;border-radius:4px;background:#c7d2fe;display:flex;align-items:center;justify-content:center;font-size:11px}
.flow-step-box.current{border-color:#0ea5e9;background:#e0f2fe;color:#0369a1}
.flow-step-box.future{border-color:#e2e8f0;background:#f8fafc;color:#94a3b8}
.flow-step-box.future .icon{background:#e2e8f0}
.flow-step-label{font-size:10px;color:#94a3b8;position:absolute;top:-18px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><div class="logo">章</div>智慧学工 · 用章</div>
  <nav class="sidebar-nav">
    <div class="nav-section">申请</div>
    <a class="nav-item" href="../apply-pc/01-apply-form.html"><span class="nav-icon">📝</span>用印申请</a>
    <a class="nav-item" href="../apply-pc/02-my-applications.html"><span class="nav-icon">📄</span>我的申请</a>
    <div class="nav-section">审批</div>
    <a class="nav-item active" href="01-pending-list.html"><span class="nav-icon">⏳</span>待审批</a>
    <a class="nav-item" href="05-history.html"><span class="nav-icon">✅</span>已审批</a>
    <div class="nav-section">管理</div>
    <a class="nav-item" href="../admin/01-dashboard.html"><span class="nav-icon">📊</span>数据概览</a>
    <a class="nav-item" href="../admin/02-application-list.html"><span class="nav-icon">📋</span>申请记录</a>
    <a class="nav-item" href="../admin/03-settings.html"><span class="nav-icon">⚙</span>系统设置</a>
  </nav>
  <div class="sidebar-footer"><a href="../index.html">← 返回首页</a></div>
</aside>

<div class="main">
  <header class="topbar">
    <span class="topbar-title">审批详情</span>
    <span class="topbar-user">王老师 · 辅导员</span>
  </header>

  <div class="detail-header">
    <div class="detail-header-inner">
      <div class="tab-row">
        <a class="tab-item" href="02-approval-detail.html">表单信息</a>
        <a class="tab-item" href="02-detail-cc.html">抄送设置</a>
        <a class="tab-item active" href="02-detail-flow.html">流程图</a>
        <a class="tab-item" href="02-detail-approver.html">当前审批人</a>
        <a class="tab-item" href="02-detail-record.html">审批记录</a>
        <a class="close-btn" href="01-pending-list.html" title="关闭">✕</a>
      </div>
      <div class="title-row">
        <div class="title-left">
          <span class="title-name">用章申请（审批）</span>
          <span class="tag tag-node">当前节点：辅导员审批</span>
          <span class="tag tag-user">发起人：张三</span>
          <span class="tag-status">审批中</span>
        </div>
        <div class="action-btns">
          <a class="btn btn-pass" href="03-approve-confirm.html">通过</a>
          <a class="btn btn-fail" href="04-reject-confirm.html">不通过</a>
          <a class="btn btn-return" href="04-reject-confirm.html">驳回</a>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-title">流程图</div>
      <div class="flow-canvas">
        <div class="flow-chain">
          <div class="flow-start"><div class="flow-start-inner"></div></div>
          <div class="flow-connector"></div>

          <div class="flow-step">
            <div class="flow-step-box"><span class="icon">📝</span>用章申请</div>
          </div>
          <div class="flow-connector"></div>

          <div class="flow-step">
            <div class="flow-step-box current"><span class="icon">👤</span>辅导员审批</div>
          </div>
          <div class="flow-connector"></div>

          <div class="flow-step">
            <div class="flow-step-box future"><span class="icon">👤</span>学院党委副书记审批</div>
          </div>
          <div class="flow-connector"></div>

          <div class="flow-step">
            <div class="flow-step-box future"><span class="icon">👤</span>学工部负责人审批</div>
          </div>
          <div class="flow-connector"></div>

          <div class="flow-step">
            <span class="flow-step-label">审核完成</span>
            <div class="flow-end"><div class="flow-end-inner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
