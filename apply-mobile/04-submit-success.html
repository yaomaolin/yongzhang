<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>提交成功 - 智慧学工</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#1e293b;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:60px}
a{text-decoration:none;color:inherit}
.header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:50}
.header h1{font-size:16px;font-weight:600;flex:1;text-align:center}

.success-area{display:flex;flex-direction:column;align-items:center;padding:40px 24px 24px}
.success-icon{width:64px;height:64px;border-radius:50%;background:#ecfdf5;border:2px solid #059669;display:flex;align-items:center;justify-content:center;font-size:28px;color:#059669;margin-bottom:16px}
.success-title{font-size:18px;font-weight:700;margin-bottom:6px}
.success-sub{font-size:13px;color:#64748b;text-align:center}

.info-card{background:#fff;border-radius:10px;margin:16px 16px 0;padding:16px;border:1px solid #e2e8f0}
.info-card-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5}
.info-card-row:last-child{border-bottom:none}
.info-card-label{font-size:13px;color:#94a3b8}
.info-card-value{font-size:13px;color:#1e293b;font-weight:500}
.badge-reviewing{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#fffbeb;color:#d97706;font-weight:500}

.btn-group{padding:24px 16px 0;display:flex;flex-direction:column;gap:10px}
.btn-primary{display:block;width:100%;padding:13px;border-radius:10px;text-align:center;font-size:15px;font-weight:600;background:#d97706;color:#fff}
.btn-outline{display:block;width:100%;padding:13px;border-radius:10px;text-align:center;font-size:15px;font-weight:500;background:#fff;color:#64748b;border:1px solid #e2e8f0}

.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:375px;background:#fff;border-top:1px solid #e5e7eb;display:flex;padding:6px 0 env(safe-area-inset-bottom,8px);z-index:50}
.tab-bar a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#94a3b8;padding:4px 0}
.tab-bar a.active{color:#d97706}
.tab-bar a .ticon{font-size:18px}
</style>
</head>
<body>

<div class="header">
  <h1>提交成功</h1>
</div>

<div class="success-area">
  <div class="success-icon">✓</div>
  <div class="success-title">申请提交成功</div>
  <div class="success-sub">您的用章申请已提交，请等待审批</div>
</div>

<div class="info-card">
  <div class="info-card-row"><span class="info-card-label">申请编号</span><span class="info-card-value">YZ20260416006</span></div>
  <div class="info-card-row"><span class="info-card-label">盖章内容</span><span class="info-card-value">2025-2026学年优秀学生奖状</span></div>
  <div class="info-card-row"><span class="info-card-label">提交时间</span><span class="info-card-value">2026-04-16 15:30</span></div>
  <div class="info-card-row"><span class="info-card-label">当前状态</span><span class="info-card-value"><span class="badge-reviewing">审批中</span></span></div>
</div>

<div class="btn-group">
  <a class="btn-primary" href="03-application-detail.html">查看申请详情</a>
  <a class="btn-outline" href="02-my-applications.html">返回首页</a>
</div>

<nav class="tab-bar">
  <a class="active" href="01-apply-form.html"><span class="ticon">📝</span>用印申请</a>
  <a href="02-my-applications.html"><span class="ticon">📄</span>我的申请</a>
</nav>

</body>
</html>
